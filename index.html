<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上班路線顧問</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07090f;
    --card: #0f1520;
    --border: #1a2438;
    --accent: #3b82f6;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #4a5a72;
    --soft: #8899b4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(59,130,246,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(34,197,94,0.04) 0%, transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  .wrap {
    position:relative; z-index:1;
    max-width:640px;
    margin:0 auto;
    padding:28px 18px 72px;
  }

  .top {
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:24px;
  }
  .top-left h1 {
    font-size:26px;
    font-weight:900;
    letter-spacing:-0.5px;
    line-height:1.15;
  }
  .top-left h1 span { color: var(--accent); }
  .top-left .route-desc {
    font-size:12px;
    color:var(--muted);
    margin-top:5px;
    font-family:'Space Mono',monospace;
    line-height:1.5;
  }
  .clock-box {
    text-align:right;
    flex-shrink:0;
    margin-left:16px;
  }
  .clock-box .time {
    font-family:'Space Mono',monospace;
    font-size:28px;
    font-weight:700;
    color:var(--accent);
    line-height:1;
  }
  .clock-box .date {
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
  }

  .status-bar {
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 16px;
    margin-bottom:20px;
  }
  .status-dot {
    width:9px; height:9px; border-radius:50%;
    flex-shrink:0;
    animation: pulse 2s infinite;
  }
  .status-dot.peak   { background:var(--red); }
  .status-dot.moderate { background:var(--yellow); }
  .status-dot.light  { background:var(--green); }
  .status-text { flex:1; font-size:13px; font-weight:700; }
  .status-sub { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; }

  .big-rec {
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
    border:1px solid transparent;
    animation: slideUp 0.5s ease;
  }
  .big-rec.green-glow { background:rgba(34,197,94,0.07); border-color:rgba(34,197,94,0.25); }
  .big-rec.yellow-glow { background:rgba(234,179,8,0.07); border-color:rgba(234,179,8,0.2); }
  .big-rec.blue-glow { background:rgba(59,130,246,0.07); border-color:rgba(59,130,246,0.2); }

  .big-rec .label {
    font-size:10px;
    font-family:'Space Mono',monospace;
    letter-spacing:2px;
    text-transform:uppercase;
    opacity:0.6;
    margin-bottom:6px;
  }
  .big-rec .route-title {
    font-size:22px;
    font-weight:900;
    line-height:1.2;
    margin-bottom:6px;
  }
  .big-rec .route-path {
    font-size:12px;
    color:var(--soft);
    font-family:'Space Mono',monospace;
    line-height:1.6;
    margin-bottom:10px;
  }
  .big-rec .eta-row {
    display:flex;
    align-items:baseline;
    gap:6px;
  }
  .big-rec .eta-num {
    font-family:'Space Mono',monospace;
    font-size:42px;
    font-weight:700;
    line-height:1;
  }
  .big-rec.green-glow .eta-num { color:var(--green); }
  .big-rec.yellow-glow .eta-num { color:var(--yellow); }
  .big-rec.blue-glow .eta-num { color:var(--accent); }
  .big-rec .eta-unit { font-size:16px; color:var(--soft); font-weight:300; }
  .big-rec .eta-note { font-size:12px; color:var(--muted); margin-left:8px; }

  .section-label {
    font-size:10px;
    font-family:'Space Mono',monospace;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:10px;
    padding-left:2px;
  }
  .route-list { display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }

  .route-item {
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
    position:relative;
    overflow:hidden;
    transition: transform 0.15s;
  }
  .route-item:hover { transform:translateX(3px); }
  .route-item::after {
    content:'';
    position:absolute; left:0; top:0; bottom:0;
    width:3px;
  }
  .route-item.rank-1::after { background:var(--green); }
  .route-item.rank-2::after { background:var(--yellow); }
  .route-item.rank-3::after { background:var(--red); }

  .rank-num {
    font-family:'Space Mono',monospace;
    font-size:18px;
    font-weight:700;
    width:28px;
    text-align:center;
    flex-shrink:0;
  }
  .rank-1 .rank-num { color:var(--green); }
  .rank-2 .rank-num { color:var(--yellow); }
  .rank-3 .rank-num { color:var(--red); }

  .route-info { flex:1; min-width:0; }
  .route-name { font-size:14px; font-weight:700; margin-bottom:2px; }
  .route-sub { font-size:11px; color:var(--muted); line-height:1.5; }

  .route-right { text-align:right; flex-shrink:0; }
  .route-mins {
    font-family:'Space Mono',monospace;
    font-size:22px;
    font-weight:700;
    line-height:1;
  }
  .rank-1 .route-mins { color:var(--green); }
  .rank-2 .route-mins { color:var(--yellow); }
  .rank-3 .route-mins { color:var(--red); }
  .route-unit { font-size:10px; color:var(--muted); margin-top:1px; }
  .tag {
    display:inline-block;
    font-size:9px;
    font-family:'Space Mono',monospace;
    padding:2px 7px;
    border-radius:8px;
    margin-top:4px;
    letter-spacing:0.5px;
  }
  .tag-best { background:rgba(34,197,94,0.15); color:var(--green); }
  .tag-ok   { background:rgba(234,179,8,0.15); color:var(--yellow); }
  .tag-bad  { background:rgba(239,68,68,0.15); color:var(--red); }

  .ai-box {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:18px 20px;
    margin-bottom:16px;
  }
  .ai-top {
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:12px;
  }
  .ai-blink {
    width:7px; height:7px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse 1.5s infinite;
  }
  .ai-title {
    font-size:11px;
    font-family:'Space Mono',monospace;
    color:var(--accent);
    letter-spacing:1px;
  }
  .ai-text {
    font-size:14px;
    line-height:1.85;
    color:var(--soft);
    font-weight:300;
    min-height:50px;
  }
  .ai-text.loading {
    display:flex; align-items:center; gap:10px; color:var(--muted);
  }
  .spin {
    width:15px; height:15px;
    border:2px solid var(--border);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin 0.7s linear infinite;
    flex-shrink:0;
  }

  .btn-maps {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:transparent;
    border:1px solid var(--border);
    border-radius:12px;
    padding:13px 20px;
    color:var(--soft);
    font-size:14px;
    font-family:'Noto Sans TC',sans-serif;
    cursor:pointer;
    width:100%;
    text-decoration:none;
    margin-bottom:10px;
    transition:all 0.2s;
  }
  .btn-maps:hover { border-color:var(--accent); color:var(--accent); }

  .btn-refresh {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:rgba(59,130,246,0.12);
    border:1px solid rgba(59,130,246,0.35);
    border-radius:12px;
    padding:13px 20px;
    color:var(--accent);
    font-size:14px;
    font-weight:700;
    font-family:'Noto Sans TC',sans-serif;
    cursor:pointer;
    width:100%;
    transition:all 0.2s;
  }
  .btn-refresh:hover { background:rgba(59,130,246,0.22); }
  .btn-refresh.spin-icon svg { animation:spin 0.8s linear infinite; }

  .footer {
    text-align:center;
    padding-top:28px;
    font-size:11px;
    color:var(--muted);
    font-family:'Space Mono',monospace;
    line-height:1.9;
  }

  .divider {
    display:flex;
    align-items:center;
    gap:12px;
    margin:28px 0 20px;
  }
  .divider-line { flex:1; height:1px; background:var(--border); }
  .divider-label {
    font-size:11px;
    font-family:'Space Mono',monospace;
    color:var(--muted);
    white-space:nowrap;
    letter-spacing:0.5px;
  }

  .route-desc-card {
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 16px;
    font-size:13px;
  }
  .route-desc-from { color:var(--soft); }
  .route-desc-arrow { color:var(--muted); font-size:16px; }
  .route-desc-to { color:var(--text); font-weight:700; }

  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.4;transform:scale(0.75)}
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes slideUp {
    from{opacity:0;transform:translateY(14px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="top-left">
      <h1>今天走<span>哪條路</span>？</h1>
      <div class="route-desc">
        桃園中壢/楊梅<br>
        → 新竹科學園區科技生活館
      </div>
    </div>
    <div class="clock-box">
      <div class="time" id="clkTime">--:--</div>
      <div class="date" id="clkDate">--</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div>
      <div class="status-text" id="statusText">分析中...</div>
      <div class="status-sub" id="statusSub"></div>
    </div>
  </div>

  <div class="big-rec blue-glow" id="bigRec">
    <div class="label">✦ 今日建議路線</div>
    <div class="route-title" id="bigTitle">—</div>
    <div class="route-path" id="bigPath"></div>
    <div class="eta-row">
      <div class="eta-num" id="bigEta">—</div>
      <div class="eta-unit">分鐘</div>
      <div class="eta-note" id="bigNote"></div>
    </div>
  </div>

  <div class="section-label">三條路線比較</div>
  <div class="route-list" id="routeList"></div>

  <div class="ai-box">
    <div class="ai-top">
      <div class="ai-blink"></div>
      <div class="ai-title">AI 路況分析</div>
    </div>
    <div class="ai-text loading" id="aiText">
      <div class="spin"></div>
      <span>正在分析路況...</span>
    </div>
  </div>

  <!-- ── SECTION 2: 進園區最後一段 ── -->
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-label">第二段　下交流道後進園區</div>
    <div class="divider-line"></div>
  </div>

  <div class="route-desc-card">
    <div class="route-desc-from">📍 新竹交流道附近</div>
    <div class="route-desc-arrow">↓</div>
    <div class="route-desc-to">🏢 科技生活館（工業東二路1號）</div>
  </div>

  <div class="section-label" style="margin-top:16px;">三條進園區路線</div>
  <div class="route-list" id="routeList2"></div>

  <div class="ai-box" id="aiBox2">
    <div class="ai-top">
      <div class="ai-blink" style="background:#a78bfa"></div>
      <div class="ai-title" style="color:#a78bfa">AI 進園區建議</div>
    </div>
    <div class="ai-text loading" id="aiText2">
      <div class="spin" style="border-top-color:#a78bfa"></div>
      <span>分析進園區路況...</span>
    </div>
  </div>

  <a class="btn-maps" href="https://www.google.com.tw/maps/dir/24.8046891,121.0097255/24.7745181,121.0190116/@24.7896787,121.0062226,16.17z/data=!4m2!4m1!3e0?hl=zh-TW&entry=ttu" target="_blank" style="margin-bottom:10px;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    Google Maps：進園區路線
  </a>

  <a class="btn-maps" href="https://www.google.com.tw/maps/dir/25.0035108,121.2511991/%E6%96%B0%E7%AB%B9%E7%A7%91%E5%AD%B8%E5%9C%92%E5%8D%80%E7%A7%91%E6%8A%80%E7%94%9F%E6%B4%BB%E9%A4%A8+300%E6%96%B0%E7%AB%B9%E5%B8%82%E6%9D%B1%E5%8D%80%E5%B7%A5%E6%A5%AD%E6%9D%B1%E4%BA%8C%E8%B7%AF1%E8%99%9F/@24.8915909,121.0448237,12z/data=!3m2!4b1!5s0x346c089fa00a526b:0xa62da95820835337!4m9!4m8!1m0!1m5!1m1!1s0x34683619431d9d5d:0x88f168858f0b73b3!2m2!1d121.0056449!2d24.7798448!3e0?hl=zh-TW&entry=ttu" target="_blank">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    Google Maps：桃園→新竹全程
  </a>

  <button class="btn-refresh" id="refreshBtn" onclick="doRefresh()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    重新分析
  </button>

  <div class="footer">
    上次更新：<span id="updTime">—</span><br>
    時段估算 + AI 分析 · 實際路況請搭配即時導航
  </div>

</div>

<script>
const ROUTES = [
  {
    id: "freeway1_wuyang",
    name: "國道一號（五楊高架）",
    shortName: "五楊高架",
    path: "中壢↑五楊高架 → 楊梅後接國一平面 → 新竹交流道 → 園區",
    note: "桃園段高架順暢，楊梅後合流平面，新竹段尖峰仍易塞",
    baseMins: 38,
    peakFactor: 1.55,
    moderateFactor: 1.2,
    lightFactor: 1.0,
  },
  {
    id: "freeway1_surface",
    name: "國道一號（平面）",
    shortName: "一號平面",
    path: "中壢/楊梅 → 國一平面南下 → 新竹交流道 → 園區",
    note: "全線平面，尖峰時新竹竹北段容易嚴重壅塞",
    baseMins: 40,
    peakFactor: 1.75,
    moderateFactor: 1.35,
    lightFactor: 1.05,
  },
  {
    id: "freeway3_via2",
    name: "國道三號（經國二繞行）",
    shortName: "三號繞行",
    path: "楊梅 → 國一往北 → 國二往西 → 國三往南 → 新竹系統 → 園區",
    note: "路程較長但避開國一新竹壅塞瓶頸，尖峰時反而穩定",
    baseMins: 55,
    peakFactor: 1.12,
    moderateFactor: 1.05,
    lightFactor: 1.0,
  },
];

function getTraffic(h, m) {
  const t = h * 60 + m;
  const dow = new Date().getDay();
  const isWeekend = (dow === 0 || dow === 6);
  if (isWeekend) return { level:"light", label:"假日 · 路況順暢", sub:"非尖峰時段，各路線皆通", dot:"light" };
  if (t >= 420 && t < 450) return { level:"moderate", label:"即將進入早尖峰", sub:"建議提早出發或走國三繞行", dot:"moderate" };
  if (t >= 450 && t < 540) return { level:"peak",     label:"⚠ 早尖峰高峰期", sub:"國一新竹竹北段嚴重壅塞", dot:"peak" };
  if (t >= 540 && t < 570) return { level:"moderate", label:"尖峰尾段",        sub:"路況逐漸改善，再等 20 分更好", dot:"moderate" };
  if (t >= 1020 && t < 1140) return { level:"moderate", label:"晚尖峰 (返家方向)", sub:"往北方向較慢，此路線影響不大", dot:"moderate" };
  return { level:"light", label:"離峰時段 · 順暢", sub:"各路線皆通暢", dot:"light" };
}

function calcTime(route, level) {
  const f = { peak: route.peakFactor, moderate: route.moderateFactor, light: route.lightFactor }[level] || 1;
  return Math.round(route.baseMins * f);
}

function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  document.getElementById("clkTime").textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const days = ["日","一","二","三","四","五","六"];
  document.getElementById("clkDate").textContent = `${now.getMonth()+1}/${now.getDate()} 週${days[now.getDay()]}`;
  return now;
}

function renderPage(now) {
  const h = now.getHours(), m = now.getMinutes();
  const traffic = getTraffic(h, m);

  document.getElementById("statusDot").className = "status-dot " + traffic.dot;
  document.getElementById("statusText").textContent = traffic.label;
  document.getElementById("statusSub").textContent = traffic.sub;

  const results = ROUTES.map(r => ({ ...r, mins: calcTime(r, traffic.level) }))
    .sort((a,b) => a.mins - b.mins);

  const best = results[0];
  const glowMap = { freeway3_via2:"blue-glow", freeway1_wuyang:"green-glow", freeway1_surface:"yellow-glow" };
  const bigRec = document.getElementById("bigRec");
  bigRec.className = "big-rec " + (glowMap[best.id] || "blue-glow");
  document.getElementById("bigTitle").textContent = best.name;
  document.getElementById("bigPath").textContent = best.path;
  document.getElementById("bigEta").textContent = best.mins;
  const saved = results[results.length-1].mins - best.mins;
  document.getElementById("bigNote").textContent =
    saved > 3 ? `比最慢選項省約 ${saved} 分鐘` : "各路線差距不大";

  const tagMap = ["tag-best","tag-ok","tag-bad"];
  const tagLabel = ["推薦","備選","較慢"];
  const rankClass = ["rank-1","rank-2","rank-3"];
  const grid = document.getElementById("routeList");
  grid.innerHTML = "";
  results.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = `route-item ${rankClass[i]}`;
    div.innerHTML = `
      <div class="rank-num">${i+1}</div>
      <div class="route-info">
        <div class="route-name">${r.name}</div>
        <div class="route-sub">${r.note}</div>
      </div>
      <div class="route-right">
        <div class="route-mins">${r.mins}</div>
        <div class="route-unit">分鐘</div>
        <span class="tag ${tagMap[i]}">${tagLabel[i]}</span>
      </div>
    `;
    grid.appendChild(div);
  });

  return { traffic, results, h, m };
}

let aiRunning = false;

async function runAI(traffic, results, h, m) {
  if (aiRunning) return;
  aiRunning = true;
  const aiEl = document.getElementById("aiText");
  aiEl.className = "ai-text loading";
  aiEl.innerHTML = `<div class="spin"></div><span>AI 分析中...</span>`;

  const pad = n => String(n).padStart(2,"0");
  const isWeekend = [0,6].includes(new Date().getDay());
  const routeLines = results.map((r,i) =>
    `${i+1}. ${r.name}：估計 ${r.mins} 分鐘（${r.note}）`
  ).join("\n");

  const prompt = `你是熟悉桃園到新竹通勤路況的駕駛顧問。

通勤路線：桃園市中壢/楊梅交界 → 新竹科學園區科技生活館
現在時間：${pad(h)}:${pad(m)}，${isWeekend?"週末假日":"平日"}，路況：${traffic.label}

三條路線（依預估時間排序）：
${routeLines}

路線說明補充：
- 五楊高架：在桃園段走高架，到楊梅後下來接國一平面，之後路線與「平面」相同
- 國一平面：全程走國一省道平面往南到新竹
- 國三繞行：從楊梅往北走國一接國二，再轉國三往南，繞一大圈但避開國一新竹段瓶頸

請用繁體中文，2-3句話，友善自然的語氣說：
1. 現在最建議走哪條路及理由
2. 有什麼特別注意的事
直接說重點，像朋友在建議一樣，不要標題或條列。`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:220,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data = await resp.json();
    const txt = (data.content||[]).map(c=>c.text||"").join("").trim();
    aiEl.className = "ai-text";
    aiEl.textContent = txt || fallback(traffic, results);
  } catch {
    aiEl.className = "ai-text";
    aiEl.textContent = fallback(traffic, results);
  } finally {
    aiRunning = false;
    const n = new Date();
    const p = x => String(x).padStart(2,"0");
    document.getElementById("updTime").textContent = `${p(n.getHours())}:${p(n.getMinutes())}`;
  }
}

function fallback(traffic, results) {
  const best = results[0];
  const isWeekend = [0,6].includes(new Date().getDay());
  if (isWeekend) return `假日路況輕鬆！走 ${best.shortName} 最直接，約 ${best.mins} 分鐘可到，出發吧！`;
  if (traffic.level === "peak") {
    if (best.id === "freeway3_via2")
      return `現在早尖峰，國一新竹段非常塞！雖然國三繞國二看起來遠，但路況穩定，整體反而省時。強烈建議走國三繞行，避開國一地獄路段。`;
    return `早尖峰時段，${best.shortName} 目前估計最快，約 ${best.mins} 分鐘。建議開 Google Maps 確認國一新竹段即時路況再決定。`;
  }
  if (traffic.level === "moderate")
    return `路況中等，走 ${best.shortName} 約 ${best.mins} 分鐘。如果不趕時間，再等 15-20 分鐘出發會順很多。`;
  return `現在路況很順！直接走 ${best.shortName} 最省時，約 ${best.mins} 分鐘，出發！`;
}

// ════════════════════════════════════════
// 第二段路線：下交流道後進園區
// 起點約 24.80, 121.01（新竹交流道附近）
// 終點：科技生活館（工業東二路1號）
// ════════════════════════════════════════
const ROUTES2 = [
  {
    id: "guangfu",
    name: "光復路交流道",
    shortName: "光復路",
    path: "光復路交流道 → 光復路 → 園區一路 → 力行二路",
    note: "走光復路市區段，路口多但路線直覺，尖峰易塞光復路口",
    baseMins: 12,
    peakFactor: 1.7,
    moderateFactor: 1.3,
    lightFactor: 1.0,
  },
  {
    id: "hsinchu_science",
    name: "竹科交流道",
    shortName: "竹科交流道",
    path: "竹科交流道 → 直接進入園區",
    note: "最直接進園區，但交流道出口本身尖峰時排隊長",
    baseMins: 8,
    peakFactor: 1.9,
    moderateFactor: 1.4,
    lightFactor: 1.0,
  },
  {
    id: "gongdao5",
    name: "公道五交流道",
    shortName: "公道五",
    path: "公道五交流道 → 慈雲路 → 園區一路 → 目的地",
    note: "繞行較遠但避開竹科交流道排隊，尖峰時段常是最穩選擇",
    baseMins: 14,
    peakFactor: 1.35,
    moderateFactor: 1.15,
    lightFactor: 1.0,
  },
];

function renderRoutes2(traffic) {
  const results2 = ROUTES2.map(r => ({ ...r, mins: calcTime(r, traffic.level) }))
    .sort((a,b) => a.mins - b.mins);

  const tagMap = ["tag-best","tag-ok","tag-bad"];
  const tagLabel = ["推薦","備選","較慢"];
  const rankClass = ["rank-1","rank-2","rank-3"];
  const grid2 = document.getElementById("routeList2");
  grid2.innerHTML = "";

  results2.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = `route-item ${rankClass[i]}`;
    div.innerHTML = `
      <div class="rank-num">${i+1}</div>
      <div class="route-info">
        <div class="route-name">${r.name}</div>
        <div class="route-sub">${r.note}</div>
      </div>
      <div class="route-right">
        <div class="route-mins">${r.mins}</div>
        <div class="route-unit">分鐘</div>
        <span class="tag ${tagMap[i]}">${tagLabel[i]}</span>
      </div>
    `;
    grid2.appendChild(div);
  });

  return results2;
}

let aiRunning2 = false;

async function runAI2(traffic, results2, h, m) {
  if (aiRunning2) return;
  aiRunning2 = true;
  const aiEl = document.getElementById("aiText2");
  aiEl.className = "ai-text loading";
  aiEl.innerHTML = `<div class="spin" style="border-top-color:#a78bfa"></div><span>分析中...</span>`;

  const pad = n => String(n).padStart(2,"0");
  const isWeekend = [0,6].includes(new Date().getDay());
  const routeLines = results2.map((r,i) =>
    `${i+1}. ${r.name}：估計 ${r.mins} 分鐘（${r.note}）`
  ).join("\n");

  const prompt = `你是熟悉新竹科學園區通勤路況的顧問。

這是通勤最後一段：從新竹交流道附近進入新竹科學園區科技生活館（工業東二路1號）。
現在時間：${pad(h)}:${pad(m)}，${isWeekend?"週末":"平日"}，路況等級：${traffic.label}

三條進園區路線（依預估時間排序）：
${routeLines}

路線說明：
- 光復路交流道：下交流道走光復路，再接園區一路，最後走力行二路到目的地
- 竹科交流道：直接從竹科交流道下，最短距離進園區，但出口本身尖峰排隊長
- 公道五交流道：走公道五下，接慈雲路再接園區一路，稍遠但避開竹科出口回堵

請用繁體中文，1-2句話，直接說哪條最好及原因，語氣像朋友建議，不要條列。`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:150,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data = await resp.json();
    const txt = (data.content||[]).map(c=>c.text||"").join("").trim();
    aiEl.className = "ai-text";
    aiEl.textContent = txt || fallback2(traffic, results2);
  } catch {
    aiEl.className = "ai-text";
    aiEl.textContent = fallback2(traffic, results2);
  } finally {
    aiRunning2 = false;
  }
}

function fallback2(traffic, results2) {
  const best = results2[0];
  if (traffic.level === "peak")
    return `尖峰時段竹科交流道出口常大排長龍！建議走${best.shortName}，雖然稍遠但整體比較順。`;
  if (traffic.level === "moderate")
    return `路況普通，走${best.shortName}約 ${best.mins} 分鐘進園區，是目前最順的選擇。`;
  return `路況順暢，走${best.shortName}最快，約 ${best.mins} 分鐘就到了！`;
}

function doRefresh() {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spin-icon");
  setTimeout(() => btn.classList.remove("spin-icon"), 900);
  const now = updateClock();
  const { traffic, results, h, m } = renderPage(now);
  const results2 = renderRoutes2(traffic);
  runAI(traffic, results, h, m);
  runAI2(traffic, results2, h, m);
}

setInterval(updateClock, 1000);
setInterval(doRefresh, 5 * 60 * 1000);
doRefresh();
</script>
